spring:
  application:
    name: sofit-admin

  # 활성 프로파일 (local / dev / release)
  profiles:
    active: test
    include: common

  # JPA (모듈별 override)
  jpa:
#    defer-datasource-initialization: true
    hibernate:
      ddl-auto: validate

  # Spring Batch
  batch:
    job:
      enabled: false  # 서버 시작 시 배치 자동 실행 방지 (API 트리거로만 실행)
    jdbc:
      initialize-schema: never

server:
  port: 8081
  servlet:
    context-path: /

# Monitoring — Prometheus
management:
  endpoints:
    web:
      exposure:
        include: health, prometheus
  metrics:
    tags:
      application: sofit-admin
      env: prod

# 앱 설정
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3001}

# sofit-user 서버 내부 URL (알림 푸시용)
sofit:
  user:
    internal-url: ${SOFIT_USER_INTERNAL_URL:http://localhost:8080}
  ai:
    server:
      url: ${AI_SERVER_URL:http://localhost:8000}