spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:13306/sofit?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME:sofit}
    password: ${DB_PASSWORD:sofit}

  data:
    redis:
      host: localhost
      port: 16379

  jpa:
    hibernate:
      ddl-auto: validate

  session:
    store-type: redis
    timeout: 1800

app:
  cors:
    allowed-origins: http://localhost:3001
